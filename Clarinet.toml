[project]
name = "aegis-vault"
description = "Aegis Vault v3 - Secure STX Staking Platform"
authors = []
telemetry = false
cache_dir = "./.cache"

[contracts.sip-010-trait]
path = "contracts/traits/sip-010-trait.clar"

[contracts.aegis-token-v3]
path = "contracts/aegis-token-v3.clar"
depends_on = ["sip-010-trait"]

[contracts.aegis-vault-v3]
path = "contracts/aegis-vault-v3.clar"
depends_on = ["aegis-token-v3", "sip-010-trait"]

[contracts.aegis-treasury]
path = "contracts/aegis-treasury-v2-15.clar"

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
